[tool.ruff]
exclude = [
    "src-autonomy/build",
    "src-autonomy/log",
    "src-autonomy/install",
    "src-platform/build",
    "src-platform/log",
    "src-platform/install",
]
line-length = 100
indent-width = 4
target-version = "py312"

[tool.ruff.lint]
fixable = ["ALL"]
unfixable = []
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "I",   # isort
    "RUF", # ruff-specific rules
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
docstring-code-line-length = "dynamic"
