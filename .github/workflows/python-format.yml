name: Python Lint & Format Check

on:
  push:
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "pixi.toml"
      - "pixi.lock"
  pull_request:
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "pixi.toml"
      - "pixi.lock"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: lint
          cache: true

      - name: Ruff lint
        run: pixi run -e lint ruff-check

      - name: Ruff format check
        run: pixi run -e lint ruff-format-check
