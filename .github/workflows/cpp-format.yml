name: Clang Format Check

on:
  push:
    paths:
      - "**/*.cpp"
      - "**/*.cc"
      - "**/*.cxx"
      - "**/*.c"
      - "**/*.h"
      - "**/*.hpp"
      - "**/*.hxx"
      - ".clang-format"
      - "pixi.toml"
      - "pixi.lock"
  pull_request:
    paths:
      - "**/*.cpp"
      - "**/*.cc"
      - "**/*.cxx"
      - "**/*.c"
      - "**/*.h"
      - "**/*.hpp"
      - "**/*.hxx"
      - ".clang-format"
      - "pixi.toml"
      - "pixi.lock"

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: lint
          cache: true

      - name: Check formatting
        run: |
          find . -type f \( \
            -name "*.cpp" -o -name "*.cc" -o -name "*.cxx" -o \
            -name "*.c"   -o -name "*.h"  -o -name "*.hpp" -o \
            -name "*.hxx" \
          \) -not -path "./.git/*" -not -path "*/build/*" -not -path "*/install/*" -print0 \
            | xargs -0 --no-run-if-empty pixi run -e lint clang-format --dry-run --Werror
