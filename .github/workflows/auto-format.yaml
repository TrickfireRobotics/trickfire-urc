name: auto-format-code

on:
  push:
  pull_request:

jobs:
  format-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Install Ruff
        uses: astral-sh/ruff-action@v3

      - name: Format C/C++ with clang-format
        run: |
          find src -type f \( -name '*.c' -o -name '*.h' -o -name '*.cpp' -o -name '*.hpp' -o -name '*.cc' -o -name '*.hh' \) \
            -print0 | xargs -0 -r clang-format -i

      - name: Format Python with Ruff
        run: |
          ruff check --fix --exit-zero .
          ruff format .

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format code"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
