name: Shell Format Check

on:
    push:
        paths:
            - "**/*.sh"
            - "**/*.bashrc"
            - "pixi.toml"
            - "pixi.lock"
    pull_request:
        paths:
            - "**/*.sh"
            - "**/*.bashrc"
            - "pixi.toml"
            - "pixi.lock"

jobs:
  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: lint
          cache: true

      - name: Check shell formatting
        run: pixi run -e lint shfmt-check
