name: Shell Format Check

on:
    push:
        paths:
            - "**/*.sh"
            - "**/*.bashrc"
    pull_request:
        paths:
            - "**/*.sh"
            - "**/*.bashrc"

jobs:
  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shfmt
        uses: mfinelli/setup-shfmt@v3

      - name: Check shell formatting
        run: shfmt -d .
